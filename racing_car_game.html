<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Car Game</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        #game { position: relative; width: 600px; height: 400px; margin: 0 auto; border: 2px solid #333; overflow: hidden; background-color: #e0e0e0; }
        #car { position: absolute; width: 50px; height: 100px; background-color: red; }
        #moveButton { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Racing Car Game</h1>
    <div id="game">
        <div id="car"></div>
    </div>
    <button id="moveButton">Move Car</button>

    <script>
        const car = document.getElementById('car');
        let position = 0;

        document.getElementById('moveButton').addEventListener('click', () => {
            position += 10;
            if (position >= 550) position = 0;  // Reset position
            car.style.transform = `translateX(${position}px)`;
        });
    </script>
</body>
</html>
